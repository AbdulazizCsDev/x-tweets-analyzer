services:

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: x-analyzer-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /var/data
      - key: FRONTEND_URL
        sync: false          # set this AFTER frontend deploys (e.g. https://x-analyzer-web.onrender.com)
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: x-analyzer-web
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: API_URL
        sync: false          # set this AFTER backend deploys (e.g. https://x-analyzer-api.onrender.com)
